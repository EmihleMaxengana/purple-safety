name: purple_safety
description: "A security app for personal safety"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  android_intent_plus: ^6.0.0
  google_maps_flutter: ^2.5.0
  location: ^8.0.1
  url_launcher: ^6.2.4
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.2  
  geocoding: ^4.0.0
  intl: ^0.20.2
  firebase_core: ^4.6.0
  firebase_database: ^12.2.0
  camera: ^0.12.0+1
  path_provider: ^2.1.5
  image_picker: ^1.0.4 
  record: ^6.0.0
  share_plus: ^12.0.1
  firebase_messaging: ^16.1.3
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png