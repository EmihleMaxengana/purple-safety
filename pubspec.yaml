name: purple_safety
description: "A security app for personal safety"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.2.2
  android_intent_plus: ^5.2.0
  google_maps_flutter: ^2.5.0
  location: ^5.0.0
  url_launcher: ^6.2.4
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2  
  geocoding: ^2.1.0
  intl: ^0.18.1
  firebase_core: ^2.32.0
  firebase_database: ^10.4.0
  camera: ^0.11.0+1
  path_provider: ^2.1.5
  image_picker: ^1.0.4 
  record: ^6.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png